{{- if eq .Values.postgres.deploymentType "statefulset" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgres.fullname" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgres.serviceName" . }}
  replicas: {{ .Values.postgres.replicas }}
  selector:
    matchLabels:
      {{- include "postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.postgres.service.targetPort }}
          name: postgres
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.auth.username }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.auth.password }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.auth.database }}
        {{- range $key, $value := .Values.postgres.config }}
        - name: POSTGRES_{{ $key | upper }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
      {{- if .Values.restore.enabled }}
      initContainers:
      - name: extract-dump
        image: busybox
        command:
        - sh
        - -c
        - |
          mkdir -p /dump
          if ls /dump-config/*.b64 2>/dev/null; then
            for chunk in /dump-config/*.b64; do
              cat $chunk >> /dump/dump.b64
            done
            base64 -d /dump/dump.b64 > /dump/DB.zip
            cd /dump
            unzip -o DB.zip
            rm -f DB.zip dump.b64
          fi
        volumeMounts:
        - name: dump-config
          mountPath: /dump-config
        - name: dump-data
          mountPath: /dump
      volumes:
      - name: dump-config
        configMap:
          name: {{ include "postgres.fullname" . }}-dump-chunks
      - name: dump-data
        emptyDir: {}
      {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - {{ .Values.postgres.persistence.accessMode }}
      {{- if .Values.postgres.persistence.storageClass }}
      storageClassName: {{ .Values.postgres.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end }}