{{- if and .Values.restore.enabled .Values.restore.useChartFile }}
{{- $namespace := default .Release.Namespace }}
{{- $name := include "postgres.fullname" . }}
{{- $chartDumpFile := default "DB.zip" .Values.restore.chartDumpFile }}
{{- $chartDumpChunkSize := int (default 700000 .Values.restore.chartDumpChunkSize) }}
{{- $chartDumpFiles := list }}

{{- if .Values.restore.chartDumpFiles }}
  {{- $chartDumpFiles = .Values.restore.chartDumpFiles }}
{{- else }}
  {{- range $path, $_ := .Files.Glob "files/DB.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "files/database-dumps/*.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "files/backups/*.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
{{- end }}

{{- if eq (len $chartDumpFiles) 0 }}
  {{- $chartDumpFiles = list (printf "files/%s" $chartDumpFile) }}
{{- end }}

{{- range $fileIdx, $zipPath := $chartDumpFiles }}
{{- if $.Files.Glob $zipPath }}
{{- $zipContent := $.Files.Get $zipPath }}
{{- $encoded := $zipContent | b64enc }}
{{- $chunks := splitList "" $encoded }}
{{- $chunkSize := $chartDumpChunkSize }}
{{- $totalChunks := div (len $chunks) $chunkSize }}
{{- if gt (mod (len $chunks) $chunkSize) 0 }}
  {{- $totalChunks = add $totalChunks 1 }}
{{- end }}

{{- $chunkStart := 0 }}
{{- range $chunkIdx := until $totalChunks }}
{{- $chunkEnd := add $chunkStart $chunkSize }}
{{- if gt $chunkEnd (len $chunks) }}
  {{- $chunkEnd = len $chunks }}
{{- end }}
{{- $chunk := slice $chunks $chunkStart $chunkEnd | join "" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-restore-dump-%03d-%03d" $name $fileIdx $chunkIdx }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: database-restore
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: Helm
data:
  chunk.b64: {{ $chunk | quote }}
  file-name: {{ base $zipPath | quote }}
{{- $chunkStart = $chunkEnd }}
{{- end }}
{{- else }}
{{- fail (printf "Dump zip file not found: %s" $zipPath) }}
{{- end }}
{{- end }}
{{- end }}