{{- $postgres := .Values }}
{{- if and $postgres.restore.enabled $postgres.restore.useChartFile (not $postgres.restore.useHostPath) }}
{{- $namespace := default .Release.Namespace .Values.namespace }}
{{- $name := include "postgres.fullname" . }}
{{- $chartDumpFile := default "DB.zip" $postgres.restore.chartDumpFile }}
{{- $chartDumpChunkSize := int (default 700000 $postgres.restore.chartDumpChunkSize) }}
{{- $chartDumpFiles := list }}
{{- if kindIs "slice" $postgres.restore.chartDumpFiles }}
  {{- range $f := $postgres.restore.chartDumpFiles }}
    {{- $chartDumpFiles = append $chartDumpFiles (tpl (printf "%v" $f) $) }}
  {{- end }}
{{- else if $postgres.restore.chartDumpFiles }}
  {{- fail "postgres.restore.chartDumpFiles must be a YAML list" }}
{{- end }}
{{- if eq (len $chartDumpFiles) 0 }}
  {{- range $path, $_ := .Files.Glob "DB/*.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "database-dumps/*.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
  {{- range $path, $_ := .Files.Glob "backups/*.zip" }}
    {{- $chartDumpFiles = append $chartDumpFiles $path }}
  {{- end }}
{{- end }}
{{- if eq (len $chartDumpFiles) 0 }}
  {{- $chartDumpFiles = list $chartDumpFile }}
{{- end }}
{{- range $fileIdx, $zipPath := $chartDumpFiles }}
{{- $zipPathStr := $zipPath | toString }}
{{- $encoded := ($.Files.Get $zipPathStr | b64enc) -}}
{{- if eq (len $encoded) 0 }}
{{- fail (printf "postgres.restore dump zip not found or empty: %s" $zipPathStr) }}
{{- end }}
{{- $chunks := chunk $chartDumpChunkSize (splitList "" $encoded) -}}
{{- range $chunkIdx, $chunk := $chunks }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-restore-dump-%03d-%03d" $name $fileIdx $chunkIdx }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: database-restore
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: {{ $.Chart.Name }}
data:
  file-name: {{ base $zipPathStr | quote }}
  chunk.b64: {{ join "" $chunk | quote }}
{{- end }}
{{- end }}
{{- end }}