{{- if .Values.restore.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.fullname" . }}-init-scripts
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    
    echo "Waiting for PostgreSQL to be ready..."
    until pg_isready -h {{ include "postgres.fullname" . }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }}; do
      echo "Waiting for PostgreSQL to start..."
      sleep 2
    done
    
    echo "PostgreSQL is ready. Starting initialization..."
    
    # Create databases if they don't exist
    {{- range .Values.restore.sqlFiles.coreServices }}
    echo "Creating database {{ .database }} if not exists..."
    psql -h {{ include "postgres.fullname" $ }} -p {{ $.Values.postgres.service.port }} -U {{ $.Values.postgres.auth.username }} -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '{{ .database }}'" | grep -q 1 || psql -h {{ include "postgres.fullname" $ }} -p {{ $.Values.postgres.service.port }} -U {{ $.Values.postgres.auth.username }} -d postgres -c "CREATE DATABASE {{ .database }}"
    {{- end }}
    
    # Extract and import schema if exists
    if [ -f /dump/aw_pg_schema.dump ]; then
      echo "Importing database schema..."
      psql -h {{ include "postgres.fullname" . }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }} -f /dump/aw_pg_schema.dump
    fi
    
    # Import all core service SQL files
    {{- range .Values.restore.sqlFiles.coreServices }}
    if [ -f /dump/{{ .file }} ]; then
      echo "Importing {{ .file }} into {{ .database }}..."
      psql -h {{ include "postgres.fullname" $ }} -p {{ $.Values.postgres.service.port }} -U {{ $.Values.postgres.auth.username }} -d {{ .database }} -f /dump/{{ .file }}
    else
      echo "Warning: /dump/{{ .file }} not found"
    fi
    {{- end }}
    
    echo "Database initialization completed successfully!"
{{- end }}